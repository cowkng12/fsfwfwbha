services:
  - type: web
    name: nft-research-miniapp
    runtime: python
    plan: starter
    buildCommand: npm install && npm run build && pip install -r backend/requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/app.sqlite3
      - key: CORS_ORIGINS
        value: https://nft-research-miniapp.onrender.com,http://localhost:5173
      - key: MRKT_API_URL
        value: https://api.tgmrkt.io/api/v1
      - key: MRKT_MAX_PRICE
        value: 50
      - key: MRKT_MIN_MODEL_FLOOR
        value: 50
      - key: MRKT_MIN_GIFT_FLOOR
        value: 0
      - key: MRKT_PREMIUM_BACKDROPS
        value: Black,White,Platinum,Silver,Electric Purple,Cyberpunk,Electric Indigo,Neon Blue,Azure Blue,Sapphire,Sky Blue,Mint Green,Emerald,Malachite,Aquamarine,Pacific Green,Lavender,Purple,Violet,Gold,Pure Gold,Satin Gold,Ruby,Crimson,Fuchsia,Magenta
      - key: RESEARCH_INTERVAL_SECONDS
        value: 180
      - key: KEEPALIVE_INTERVAL_SECONDS
        value: 240
      - key: PUBLIC_BASE_URL
        value: https://fsfwfwbha.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: MRKT_AUTH_TOKEN
        sync: false
    disk:
      name: nft-research-data
      mountPath: /var/data
      sizeGB: 1
