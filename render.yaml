services:
  - type: web
    name: nft-research-api
    runtime: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/app.sqlite3
      - key: CORS_ORIGINS
        value: https://nft-research-miniapp.onrender.com,http://localhost:5173
      - key: MRKT_API_URL
        value: https://api.tgmrkt.io/api/v1
      - key: RESEARCH_INTERVAL_SECONDS
        value: 180
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false
      - key: MRKT_AUTH_TOKEN
        sync: false
    disk:
      name: nft-research-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: nft-research-miniapp
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://nft-research-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
