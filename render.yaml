services:
  - type: web
    name: nft-research-miniapp
    runtime: python
    plan: starter
    buildCommand: npm install && npm run build && pip install -r backend/requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/app.sqlite3
      - key: CORS_ORIGINS
        value: https://nft-research-miniapp.onrender.com,http://localhost:5173
      - key: MRKT_API_URL
        value: https://api.tgmrkt.io/api/v1
      - key: MRKT_MAX_PRICE
        value: 10
      - key: MRKT_RESEARCH_MAX_PRICE
        value: 10
      - key: MRKT_MIN_MODEL_FLOOR
        value: 8
      - key: MRKT_MAX_MODEL_RARITY
        value: 3
      - key: MRKT_MAX_BACKDROP_RARITY
        value: 3
      - key: MRKT_MODEL_SALES_MAX_AGE_DAYS
        value: 7
      - key: MRKT_MIN_GIFT_FLOOR
        value: 0
      - key: MRKT_AUTH_COOLDOWN_SECONDS
        value: 21600
      - key: MRKT_REQUEST_DELAY_SECONDS
        value: 1.0
      - key: MRKT_PREMIUM_BACKDROPS
        value: Amber,Aquamarine,Azure Blue,Battleship Grey,Black,Burgundy,Carmine,Celtic Blue,Chestnut,Chocolate,Cobalt Blue,Copper,Crimson,Cyberpunk,Dark Green,Dark Lilac,Deep Cyan,Desert Sand,Electric Indigo,Electric Purple,Emerald,English Violet,Fandango,Feldgrau,Fire Engine,French Blue,French Violet,Fuchsia,Gold,Gunmetal,Hunter Green,Indigo Dye,Lavender,Magenta,Malachite,Midnight Blue,Mint Green,Mustard,Mystic Pearl,Neon Blue,Onyx Black,Orange,Pacific Green,Platinum,Pure Gold,Purple,Ruby,Sapphire,Satin Gold,Shamrock Green,Silver,Sky Blue,Steel Grey,Turquoise,Violet,White,Coral,Rose Gold,Peach,Teal,Navy Blue,Olive,Bronze,Lilac,Sea Foam,Cloud White,Sunset Orange
      - key: RESEARCH_INTERVAL_SECONDS
        value: 180
      - key: KEEPALIVE_INTERVAL_SECONDS
        value: 240
      - key: PUBLIC_BASE_URL
        value: https://fsfwfwbha-gtzl.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: MRKT_AUTH_TOKEN
        sync: false
    disk:
      name: nft-research-data
      mountPath: /var/data
      sizeGB: 1
